name: chezmoi-verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    name: shellcheck (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck bootstrap/stage1.sh bootstrap/stage2.sh home/private_dot_zsh/aliases.sh

  parse:
    name: per-template parse check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Seed chezmoi data
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.toml" <<'EOF'
          [data]
              name = "CI"
              email = "ci@example.com"
              profile = "core"
          EOF

      - name: chezmoi execute-template per .tmpl
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          fail=0
          while IFS= read -r tmpl; do
              # .chezmoi.toml.tmpl uses promptStringOnce — only valid in 'chezmoi init' context,
              # not execute-template. Skipped here; covered by the apply --dry-run job.
              case "$tmpl" in *.chezmoi.toml.tmpl) continue ;; esac
              if ! chezmoi execute-template --source="$GITHUB_WORKSPACE" < "$tmpl" > /dev/null; then
                  echo "::error file=$tmpl::template parse failed"
                  fail=1
              fi
          done < <(find home -name '*.tmpl' -type f)
          exit "$fail"

  apply:
    name: chezmoi apply --dry-run (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Seed chezmoi data
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.toml" <<'EOF'
          [data]
              name = "CI"
              email = "ci@example.com"
              profile = "core"
          EOF

      - name: chezmoi apply --dry-run
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi apply --source="$GITHUB_WORKSPACE" --dry-run --no-tty --verbose
