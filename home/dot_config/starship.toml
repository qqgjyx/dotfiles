# ~/.config/starship.toml — cross-shell prompt
# Clean two-line layout inspired by p10k-lean: info line, then prompt char.

add_newline = true
command_timeout = 1000

format = """
$directory$git_branch$git_status$git_state\
$python$nodejs$rust$golang$java\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

[directory]
truncation_length = 3
truncate_to_repo  = true
style             = "bold cyan"
read_only         = " 󰌾"

[git_branch]
symbol = " "
style  = "bold purple"
format = "[ on $symbol$branch]($style) "

[git_status]
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "="
staged    = "[+\\($count\\)](green)"
modified  = "!"
deleted   = "✘"
untracked = "?"
stashed   = "≡"

[cmd_duration]
min_time = 2_000
format   = "[ took $duration]($style) "
style    = "yellow"

# Language modules — only show when the project actually uses them
[python]
format = "[ via $symbol${pyv_version}\\(${virtualenv}\\)]($style)"
symbol = " "
style  = "yellow"

[nodejs]
format = "[ via $symbol$version]($style)"
symbol = " "

[rust]
format = "[ via $symbol$version]($style)"
symbol = " "

[golang]
format = "[ via $symbol$version]($style)"
symbol = " "

[java]
format = "[ via $symbol$version]($style)"
symbol = " "

# Disable noisy modules
[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[kubernetes]
disabled = true

[hostname]
disabled = true
